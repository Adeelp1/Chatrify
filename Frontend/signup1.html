<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }
    form {
      background: white;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    fieldset {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    legend {
      font-weight: bold;
      padding: 0 5px;
    }
    .checkboxes label {
      font-weight: normal;
      display: block;
    }
    .checkboxes input {
      width: auto;
      margin-right: 6px;
    }
    .actions {
      text-align: center;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 15px;
      background: #4CAF50;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    .small {
      font-size: 12px;
      color: #666;
    }
    .error {
      color: red;
      font-size: 13px;
    }
  </style>
</head>
<body>

<form id="signupForm">
  <h2>Create Account</h2>

  <label for="username">Username *</label>
  <input type="text" id="username" name="username" pattern="[a-z0-9._-]{3,30}" required>

  <label for="email">Email *</label>
  <input type="email" id="email" name="email" required>

  <label for="password">Password *</label>
  <input type="password" id="password" name="password" minlength="8" required>

  <label for="confirm_password">Confirm Password *</label>
  <input type="password" id="confirm_password" name="confirm_password" required>

  <hr>

  <label for="first_name">First Name</label>
  <input type="text" id="first_name" name="first_name">

  <label for="last_name">Last Name</label>
  <input type="text" id="last_name" name="last_name">

  <label for="display_name">Display Name</label>
  <input type="text" id="display_name" name="display_name">

  <label for="gender">Gender</label>
  <select id="gender" name="gender">
    <option value="">Prefer not to say</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="other">Other</option>
  </select>

  <fieldset>
    <legend>Interests</legend>
    <div class="checkboxes">
      <label><input type="checkbox" name="interests" value="music"> Music</label>
      <label><input type="checkbox" name="interests" value="gaming"> Gaming</label>
      <label><input type="checkbox" name="interests" value="sports"> Sports</label>
      <label><input type="checkbox" name="interests" value="movies"> Movies</label>
    </div>
  </fieldset>

  <label>
    <input type="checkbox" id="terms" required>
    I agree to the <a href="#">Terms & Privacy Policy</a>
  </label>

  <div class="actions">
    <button type="submit">Sign Up</button>
  </div>

  <p id="errorMsg" class="error"></p>
</form>

<script>
  const form = document.getElementById('signupForm');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', function(e) {
    e.preventDefault(); // prevent actual submission for demo

    const pass = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;

    if (pass !== confirm) {
      errorMsg.textContent = "Passwords do not match!";
      return;
    }

    errorMsg.textContent = "";

    // Collect values
    const formData = new FormData(form);
    const data = {};
    formData.forEach((value, key) => {
      if (data[key]) {
        // handle multiple values like interests
        if (Array.isArray(data[key])) {
          data[key].push(value);
        } else {
          data[key] = [data[key], value];
        }
      } else {
        data[key] = value;
      }
    });

    console.log("Collected data:", data);
    alert("Form validated! Check console for collected data.");
    // TODO: send data with fetch() to your backend
  });
</script>

</body>
</html>
