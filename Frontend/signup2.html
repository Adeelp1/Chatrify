<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup Form</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }
    form {
      background: #fff;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 450px;
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      color: #444;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      transition: border 0.2s;
    }
    input:focus, select:focus {
      border-color: #4CAF50;
      outline: none;
    }
    .step {
      display: none;
    }
    .step.active {
      display: block;
    }
    .actions {
      margin-top: 25px;
      display: flex;
      justify-content: space-between;
    }
    button {
      padding: 10px 20px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-next {
      background: #4CAF50;
      color: white;
    }
    .btn-next:hover { background: #43a047; }
    .btn-prev {
      background: #ddd;
    }
    .btn-prev:hover { background: #ccc; }
    .progress {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .circle {
      width: 12px;
      height: 12px;
      background: #ccc;
      border-radius: 50%;
      margin: 0 5px;
      transition: background 0.3s;
    }
    .circle.active {
      background: #4CAF50;
    }
    .strength {
      margin-top: 6px;
      height: 6px;
      border-radius: 4px;
      background: #ddd;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0;
      transition: width 0.3s;
    }
    .error {
      color: red;
      font-size: 13px;
      margin-top: 8px;
    }
    fieldset {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px;
      margin-top: 15px;
    }
    legend {
      font-weight: 600;
    }
    .checkboxes label {
      display: block;
      font-weight: normal;
      margin-top: 6px;
    }
    .checkboxes input {
      margin-right: 6px;
    }
    @media (max-width: 500px) {
      form { padding: 20px; }
    }
  </style>
</head>
<body>

<form id="signupForm">
  <div class="progress">
    <div class="circle active"></div>
    <div class="circle"></div>
  </div>
  <h2>Create Account</h2>

  <!-- Step 1: Account -->
  <div class="step active">
    <label>Username *</label>
    <input type="text" id="username" name="username" data-required="true" pattern="[a-z0-9._\-]{3,30}">
    <div id="usernameFeedback" class="error"></div>

    <label>Email *</label>
    <input type="email" id="email" name="email" data-required="true">

    <label>Password *</label>
    <input type="password" id="password" name="password" minlength="8" data-required="true">
    <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>

    <label>Confirm Password *</label>
    <input type="password" id="confirm_password" name="confirm_password" data-required="true">
  </div>

  <!-- Step 2: Personal -->
  <div class="step">
    <label>First Name</label>
    <input type="text" name="first_name">

    <label>Last Name</label>
    <input type="text" name="last_name">

    <label>Display Name</label>
    <input type="text" name="display_name">

    <label>Gender</label>
    <select name="gender">
      <option value="">Prefer not to say</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select>

    <fieldset>
      <legend>Interests</legend>
      <div class="checkboxes">
        <label><input type="checkbox" name="interests" value="music"> Music</label>
        <label><input type="checkbox" name="interests" value="gaming"> Gaming</label>
        <label><input type="checkbox" name="interests" value="sports"> Sports</label>
        <label><input type="checkbox" name="interests" value="movies"> Movies</label>
      </div>
    </fieldset>

    <label><input type="checkbox" id="terms" data-required="true"> I agree to the Terms & Privacy Policy</label>
  </div>

  <div class="actions">
    <button type="button" class="btn-prev" id="prevBtn" style="display:none;">Back</button>
    <button type="button" class="btn-next" id="nextBtn">Next</button>
  </div>

  <p id="errorMsg" class="error"></p>
</form>

<script>
  const steps = document.querySelectorAll('.step');
  const circles = document.querySelectorAll('.circle');
  let currentStep = 0;

  const form = document.getElementById('signupForm');
  const nextBtn = document.getElementById('nextBtn');
  const prevBtn = document.getElementById('prevBtn');
  const errorMsg = document.getElementById('errorMsg');
  const usernameField = document.getElementById('username');
  const usernameFeedback = document.getElementById('usernameFeedback');
  const passwordField = document.getElementById('password');
  const strengthBar = document.getElementById('strengthBar');

  function toggleRequired(stepIndex) {
    steps.forEach((s, i) => {
        const inputs = s.querySelectorAll('input, select');
        inputs.forEach(input => {
        if (i === stepIndex) {
            input.setAttribute('required', input.dataset.required === "true");
        } else {
            input.removeAttribute('required');
        }
        });
    });
    }

    function showStep(index) {
    steps.forEach((s, i) => s.classList.toggle('active', i === index));
    circles.forEach((c, i) => c.classList.toggle('active', i <= index));
    prevBtn.style.display = index > 0 ? "inline-block" : "none";
    nextBtn.textContent = index === steps.length - 1 ? "Sign Up" : "Next";

    toggleRequired(index);
    }


  nextBtn.addEventListener('click', () => {
    if (currentStep === 0) {
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }
      if (passwordField.value !== document.getElementById('confirm_password').value) {
        errorMsg.textContent = "Passwords do not match!";
        return;
      }
      errorMsg.textContent = "";
      currentStep = 1;
      showStep(currentStep);
    } else {
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }
      // Collect data
      const formData = new FormData(form);
      const data = {};
      formData.forEach((v, k) => {
        if (data[k]) {
          if (Array.isArray(data[k])) data[k].push(v);
          else data[k] = [data[k], v];
        } else data[k] = v;
      });
      console.log("Collected data:", data);
      alert("Account created! (Check console for details)");
    }
  });

  prevBtn.addEventListener('click', () => {
    currentStep = 0;
    showStep(currentStep);
  });

  // Fake username availability check
  usernameField.addEventListener('input', () => {
    const value = usernameField.value.trim();
    if (!value) {
      usernameFeedback.textContent = "";
      return;
    }
    setTimeout(() => {
      if (value.toLowerCase() === "admin") {
        usernameFeedback.textContent = "Username is taken.";
      } else {
        usernameFeedback.textContent = "";
      }
    }, 300);
  });

  // Password strength meter
  passwordField.addEventListener('input', () => {
    const val = passwordField.value;
    let strength = 0;
    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const colors = ["#ddd","#f44336","#ff9800","#4CAF50","#2e7d32"];
    strengthBar.style.width = (strength/4)*100 + "%";
    strengthBar.style.background = colors[strength];
  });
</script>

</body>
</html>
