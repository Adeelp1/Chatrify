<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>
<body>
    <form action="" method="" id="signup-form">
        <center>
            <label for="username">Username: </label>
            <input type="text" name="username" id="username" placeholder="Username" required minlength="3" maxlength="15" pattern="[A-Za-z0-9]+">
            <br><br>
            <label for="email">Email: </label>
            <input type="email" name="email" id="email" placeholder="Email" required>
            <br><br>
            <label for="password">Password: </label>
            <input type="password" name="password" id="password" placeholder="Password" required minlength="8">
            <br><br>
            <label for="confirm-password">Confirm Password: </label>
            <input type="password" name="confirm-password" id="confirm-password" placeholder="Confirm Password">
            <br><br>
            <button type="submit" id="submit">Signup</button>
        </center>
    </form>
    <script>
        const form = document.getElementById("signup-form");
        
        form.addEventListener("submit", async (event) => {
            event.preventDefault(); // stop auto-submit

            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;

            if (!username == "") {
                if (username.length < 3 || username.length > 15) {
                    alert("username length must betweeen 3 to 15");
                    return;
                }
            }
            else {
                alert("Enter a user name");
                return;
            }

            if(!email.includes("@")) {
                alert("Please enter a valid email address");
                return;
            }

            if (password.length === 0){
                alert("Enter password")
                return;
            }
            else if (password.length < 8) {
                alert("Password must be at least 8 character long");
                return;
            }

            if (password != confirmPassword) {
                alert("Enter correct confirm-password same as password");
                return;
            }

            const res = await fetch("http://localhost:3000/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ username, email, password }),
            });

            const data = await res.json();

            if (data.message) {
                window.location.href = 'login.html'
            }
            else {
                alert(data.error);
            }

        });
            
    </script>
</body>
</html>
